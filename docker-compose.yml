version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: library
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./library-python-backend/library-python/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - library_data:/var/lib/postgresql/data

  api:
    build:
      context: ./library-python-backend/library-python
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: library
      DB_USER: admin
      DB_PASSWORD: password
    ports:
      - "8080:8080"
    volumes:
      - ./library-python-backend/library-python:/usr/src/app:rw
    working_dir: /usr/src/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080

  frontend:
    build:
      context: ./library-react-frontend/library-react
      dockerfile: Dockerfile
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: "http://localhost:8080/api"
    ports:
      - "3000:3000"
    volumes:
      - ./library-react-frontend/library-react:/usr/src/app:rw
      - /usr/src/app/node_modules
    working_dir: /usr/src/app
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  library_data:
